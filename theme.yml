theme:
  url: projekt0n/github-nvim-theme
  name: github-theme
  variant: github_dark_default
  options:
    styles:
      comments: italic
  groups:
    all:
      # Inline code in markdown: regular (non-italic) red on dark grey.
      "@markup.raw.markdown_inline":
        fg: "#ff7b72"
        bg: "#2e2e2e"
      # render-markdown's own inline-code layer, pinned to the same colors.
      RenderMarkdownCodeInline:
        fg: "#ff7b72"
        bg: "#2e2e2e"
      # Harper grammar diagnostics: dark-red wavy underline, scoped to Harper's
      # namespace by plugins/lsp.lua so it never recolors other servers' hints.
      # (undercurl needs terminal support; degrades to a flat dark-red underline.)
      HarperDiagnosticUnderline:
        sp: "#8b0000"
        style: undercurl

