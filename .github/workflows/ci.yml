name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least-privilege default; the release job below overrides with contents: write.
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false

      - name: Set up Task
        uses: go-task/setup-task@01a4adf9db2d14c1de7a560f09170b6e0df736aa # v2

      - name: Install selene
        env:
          SELENE_VERSION: "0.31.0"
        run: |
          curl -sSLO "https://github.com/Kampfkarren/selene/releases/download/${SELENE_VERSION}/selene-${SELENE_VERSION}-linux.zip"
          unzip -o "selene-${SELENE_VERSION}-linux.zip" -d "$RUNNER_TEMP/selene"
          chmod +x "$RUNNER_TEMP/selene/selene"
          echo "$RUNNER_TEMP/selene" >> "$GITHUB_PATH"

      - name: Install StyLua
        env:
          STYLUA_VERSION: "v2.5.2"
        run: |
          curl -sSLO "https://github.com/JohnnyMorganz/StyLua/releases/download/${STYLUA_VERSION}/stylua-linux-x86_64.zip"
          unzip -o "stylua-linux-x86_64.zip" -d "$RUNNER_TEMP/stylua"
          chmod +x "$RUNNER_TEMP/stylua/stylua"
          echo "$RUNNER_TEMP/stylua" >> "$GITHUB_PATH"

      - name: Install markdownlint-cli2
        run: npm install -g markdownlint-cli2 # zizmor: ignore[adhoc-packages] no lockfile for a global CLI tool

      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Lint
        run: task lint

  unit-test:
    name: Unit Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    env:
      # gh-actions-lua builds Lua from source on macOS via `brew install`,
      # and the runner image's pre-tapped aws/tap trips a tap-trust warning.
      # No-op on Linux; silences the warning without adding Homebrew of our own.
      HOMEBREW_NO_REQUIRE_TAP_TRUST: "1"

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false

      - name: Set up Task
        uses: go-task/setup-task@01a4adf9db2d14c1de7a560f09170b6e0df736aa # v2

      - name: Set up Lua
        uses: leafo/gh-actions-lua@6919171ccf181b826f44b9bca76307b577217377 # v13
        with:
          luaVersion: "5.4"
          # Skip the action's Lua-build cache: it warns on the GitHub cache
          # service's transient 400s, and this repo builds uncached elsewhere.
          buildCache: "false"

      - name: Set up LuaRocks
        uses: leafo/gh-actions-luarocks@35d062def313a7699a0d513e996bcf4352f05389 # v6

      - name: Install busted
        run: luarocks install busted

      - name: Unit tests
        run: task test:unit

  # tests/integration/ runs real Busted inside a fully-loaded headless Neovim
  # (see .busted's `integration` task and scripts/busted-nvim.sh). Lua 5.1 on
  # purpose: Neovim's LuaJIT speaks the 5.1 ABI, and 5.1-built C modules load
  # into it — while luarocks itself cannot parse the luarocks.org manifest
  # under LuaJIT (luarocks/luarocks#1797).
  integration-test:
    name: Integration Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    env:
      NVIM_VERSION: "v0.12.4"
      BUSTED_ROCKS_TREE: ${{ github.workspace }}/.luarocks
      # gh-actions-lua builds Lua from source on macOS via `brew install`,
      # and the runner image's pre-tapped aws/tap trips a tap-trust warning.
      # No-op on Linux; silences the warning without adding Homebrew of our own.
      HOMEBREW_NO_REQUIRE_TAP_TRUST: "1"

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false

      - name: Set up Task
        uses: go-task/setup-task@01a4adf9db2d14c1de7a560f09170b6e0df736aa # v2

      - name: Install Neovim
        run: |
          os=$([ "$RUNNER_OS" = "macOS" ] && echo "macos" || echo "linux")
          arch=$([ "$RUNNER_ARCH" = "ARM64" ] && echo "arm64" || echo "x86_64")
          curl -sSLO "https://github.com/neovim/neovim/releases/download/${NVIM_VERSION}/nvim-${os}-${arch}.tar.gz"
          tar -xzf "nvim-${os}-${arch}.tar.gz" -C "$RUNNER_TEMP"
          echo "$RUNNER_TEMP/nvim-${os}-${arch}/bin" >> "$GITHUB_PATH"

      - name: Set up Lua 5.1
        uses: leafo/gh-actions-lua@6919171ccf181b826f44b9bca76307b577217377 # v13
        with:
          luaVersion: "5.1"
          # Skip the action's Lua-build cache: it warns on the GitHub cache
          # service's transient 400s, and this repo builds uncached elsewhere.
          buildCache: "false"

      - name: Set up LuaRocks
        uses: leafo/gh-actions-luarocks@35d062def313a7699a0d513e996bcf4352f05389 # v6

      - name: Install busted
        run: luarocks install busted

      # Exercises the functional lint path; without it the suite would fall
      # back to the missing-binary guard path.
      - name: Install markdownlint-cli2
        run: npm install -g markdownlint-cli2 # zizmor: ignore[adhoc-packages] no lockfile for a global CLI tool

      # The suite loads the real config: stdpath("config") must resolve to
      # this checkout, and the lazy-lock.json plugins must exist on disk.
      - name: Link repo as Neovim config and install plugins
        run: |
          mkdir -p "$HOME/.config"
          ln -sfn "$GITHUB_WORKSPACE" "$HOME/.config/nvim"
          task install

      - name: Integration tests
        run: task test:integration

      # The guard path only compiles when the binary is missing — hide it and
      # re-run the lint spec so both branches stay covered (one OS is enough).
      - name: Integration tests (missing-binary guard path)
        if: runner.os == 'Linux'
        run: scripts/test-without-binary.sh markdownlint-cli2 -- busted --run=integration tests/integration/markdown_lint_spec.lua

  # Publishes a GitHub release on every green push to main. The tag is CalVer
  # (YYYY.MM.DD in UTC) with a same-day counter suffix (2026.07.19, then
  # 2026.07.19.1, ...). The artifact ships only what .nvimignore permits.
  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [lint, unit-test, integration-test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write # Needed to create the GitHub release and push its tag
    concurrency:
      group: release
      cancel-in-progress: false
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Determine CalVer version
        id: version
        run: |
          base="$(date -u +%Y.%m.%d)"
          latest="$(git tag --list "$base" "$base.*" --sort=-version:refname | head -n 1)"

          if [[ -z "$latest" ]]; then
            version="$base"
          elif [[ "$latest" == "$base" ]]; then
            version="$base.1"
          else
            version="$base.$(( ${latest##*.} + 1 ))"
          fi
          
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Next version: $version"

      - name: Generate release notes
        id: notes
        env:
          VERSION: ${{ steps.version.outputs.version }}
          SERVER_URL: ${{ github.server_url }}
          REPOSITORY: ${{ github.repository }}
        run: |
          # The new tag isn't created yet, so the most recent existing tag is
          # the previous release. GitHub's --generate-notes only lists merged
          # PRs, so it comes up empty for commits pushed straight to main;
          # build notes from the commit log instead.
          prev="$(git tag --list --sort=-version:refname | head -n 1)"

          if [[ -n "$prev" ]]; then
            range="${prev}..${GITHUB_SHA}"
            compare_base="$prev"
          else
            range="$GITHUB_SHA"
            compare_base=""
          fi

          notes="$RUNNER_TEMP/release-notes.md"
          {
            echo "## Changes"
            echo
            git log --no-merges --reverse --pretty=format:'- %s (%h)' "$range"
            echo
            echo
            if [[ -n "$compare_base" ]]; then
              echo "**Full changelog:** ${SERVER_URL}/${REPOSITORY}/compare/${compare_base}...${VERSION}"
            fi
          } > "$notes"

          echo "notes=$notes" >> "$GITHUB_OUTPUT"
          cat "$notes"

      - name: Package artifact
        id: package
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          stage="$RUNNER_TEMP/stage"
          mkdir -p "$stage"
          rsync -a --exclude-from=.nvimignore ./ "$stage/"
          artifact="nvim-${VERSION}.tar.gz"
          tar -czf "$artifact" -C "$stage" .
          echo "artifact=$artifact" >> "$GITHUB_OUTPUT"
          tar -tzf "$artifact"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
          ARTIFACT: ${{ steps.package.outputs.artifact }}
          NOTES: ${{ steps.notes.outputs.notes }}
        run: |
          gh release create "$VERSION" "$ARTIFACT" \
            --title "$VERSION" \
            --target "$GITHUB_SHA" \
            --notes-file "$NOTES"

      - name: Write release summary
        env:
          VERSION: ${{ steps.version.outputs.version }}
          ARTIFACT: ${{ steps.package.outputs.artifact }}
          SERVER_URL: ${{ github.server_url }}
          REPOSITORY: ${{ github.repository }}
        run: |
          {
            echo "## Release $VERSION"
            echo
            echo "- **Tag:** \`$VERSION\`"
            echo "- **Artifact:** \`$ARTIFACT\` ($(du -h "$ARTIFACT" | cut -f1))"
            echo "- **Release:** ${SERVER_URL}/${REPOSITORY}/releases/tag/$VERSION"
            echo
            echo "<details><summary>Artifact contents</summary>"
            echo
            echo '```text'
            tar -tzf "$ARTIFACT"
            echo '```'
            echo
            echo "</details>"
          } >> "$GITHUB_STEP_SUMMARY"
