name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Lua
        uses: leafo/gh-actions-lua@v10
        with:
          luaVersion: "5.4"

      - name: Set up LuaRocks
        uses: leafo/gh-actions-luarocks@v4

      - name: Install selene
        env:
          SELENE_VERSION: "0.31.0"
        run: |
          os=$([ "$RUNNER_OS" = "macOS" ] && echo "macos" || echo "linux")
          curl -sSLO "https://github.com/Kampfkarren/selene/releases/download/${SELENE_VERSION}/selene-${SELENE_VERSION}-${os}.zip"
          unzip -o "selene-${SELENE_VERSION}-${os}.zip" -d "$RUNNER_TEMP/selene"
          chmod +x "$RUNNER_TEMP/selene/selene"
          echo "$RUNNER_TEMP/selene" >> "$GITHUB_PATH"

      - name: Install dependencies
        run: luarocks install busted

      - name: Lint
        run: selene lua/

      - name: Test
        run: busted
