name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Lua
        if: runner.os != 'Windows'
        uses: leafo/gh-actions-lua@v10
        with:
          luaVersion: "5.4"

      - name: Set up LuaRocks
        if: runner.os != 'Windows'
        uses: leafo/gh-actions-luarocks@v4

      - name: Set up Lua & LuaRocks (Windows)
        if: runner.os == 'Windows'
        run: choco install lua luarocks --yes --no-progress
        shell: pwsh

      - name: Install dependencies
        run: luarocks install busted && luarocks install luacheck

      - name: Lint
        run: luacheck lua/

      - name: Test
        run: busted
