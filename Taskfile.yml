# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: '3'


tasks:

  lint:
    desc: Lint Lua sources/tests and Markdown files
    cmds:
      - task: lint:lua
      - task: lint:md
      - task: lint:shell

  lint:lua:
    desc: Lint Lua sources and tests
    sources:
      - lua/**/*.lua
      - tests/**/*.lua
    cmd: selene .

  lint:md:
    desc: Lint Markdown files
    sources:
      - ./**/*.md
    cmd: markdownlint-cli2 "./**/*.md"

  lint:shell:
    desc: Lint Shell scripts
    sources:
      - ./**/*.sh
    cmd: find . -type f -name "*.sh" -exec shellcheck {} \;
