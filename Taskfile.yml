# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: '3'


tasks:

  lint:
    desc: Lint codebase
    cmds:
      - task: lint:lua
      - task: lint:md
      - task: lint:shell

  test:
    desc: Run full test pipeline
    cmds:
      - task: test:unit
      - task: test:integration

  lint:lua:
    desc: Lint Lua sources and tests
    sources:
      - ./**/*.lua
    cmd: selene {{ .CLI_ARGS | default "." }}

  lint:md:
    desc: Lint Markdown files
    sources:
      - ./**/*.md
    cmd: markdownlint-cli2 {{ .CLI_ARGS | default "./**/*.md" }}

  lint:shell:
    desc: Lint Shell scripts
    sources:
      - ./**/*.sh
    cmd: '{{if .CLI_ARGS}}shellcheck {{ .CLI_ARGS }}{{else}}find . -type f -name "*.sh" -exec shellcheck {} \;{{end}}'

  test:unit:
    desc: Run unit tests
    cmd: busted --run=unit {{ .CLI_ARGS | default "" }}

  test:integration:
    desc: Run integration tests
    cmd: busted --run=integration {{ .CLI_ARGS | default "" }}
